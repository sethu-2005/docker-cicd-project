version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 127028134365.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t docker-cicd-project .
      - docker tag docker-cicd-project:latest 127028134365.dkr.ecr.ap-south-1.amazonaws.com/docker-cicd-project:latest

  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push 127028134365.dkr.ecr.ap-south-1.amazonaws.com/docker-cicd-project:latest

artifacts:
  files:
    - '**/*'